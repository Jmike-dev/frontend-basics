<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!-- Figtree font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>

  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>

  <article class="card">
    <img class="card-image" src="./assets/images/illustration-article.svg" alt="Illustration of HTML and CSS code elements">

    <span class="card-badge">Learning</span>

    <p class="card-date">Published 21 Dec 2023</p>

    <h1 class="card-title">HTML <span>&amp;</span> CSS foundations</h1>

    <p class="card-text">These languages are the backbone of every website, defining structure, content, and presentation.</p>

    <div class="card-author">
      <img class="card-avatar" src="./assets/images/image-avatar.webp" alt="Greg Hooper's avatar">
      <span class="card-author-name">Greg Hooper</span>
    </div>
  </article>

</body>
</html>
