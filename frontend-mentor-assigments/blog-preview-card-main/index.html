<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css"/>

  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>

  <article class="card">
    <img class="card-image" src="./assets/images/illustration-article.svg" alt=" illustration art">

    <span class="card-badge">Learning</span>

      <img class="card-avatar" src="./assets/images/image-avatar.webp" alt="image-avatar>
      <span class="card-author-name">Greg Hooper</span>
    </div>
  </article>
